<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Share Your Experience</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .review-box {
      background: #1f2833;
      padding: 2rem;
      border-radius: 14px;
      box-shadow: 0 0 8px rgba(102, 252, 241, 0.08);
      max-width: 900px;
      margin: 2rem auto;
    }

    h2.submit-heading {
      color: #ffffff;
      margin-bottom: 0.8rem;
      font-size: 1.7rem;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .subtext {
      color: #c5c6c7;
      text-align: center;
      margin-bottom: 1rem;
      font-size: 1rem;
      line-height: 1.5;
    }

    h3 {
      color: white;
      text-align: center;
      margin-bottom: 1rem;
    }

    .form-step {
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    textarea {
      width: 100%;
      height: 130px;
      border-radius: 8px;
      border: 1px solid #45a29e;
      padding: 12px;
      resize: none;
      font-size: 1rem;
      background-color: #0b0c10;
      color: #c5c6c7;
    }

    .question {
      margin-bottom: 1rem;
      text-align: center;
    }

    .question label {
      color: #ffffff;
      font-weight: 500;
      display: block;
      margin-bottom: 6px;
    }

    .stars {
      display: flex;
      justify-content: center;
      gap: 5px;
      font-size: 1.6rem;
      cursor: pointer;
    }

    .glow-btn {
      background-color: #45a29e;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.3s ease;
    }

    .glow-btn:hover {
      background-color: #66fcf1;
      color: #0b0c10;
    }

    .feedback-message {
      text-align: center;
      color: #66fcf1;
      font-weight: 500;
      margin-top: 1.5rem;
      display: none;
    }
  </style>
</head>

<body>
  <header>
    <h1>Sentiment Analysis of Restaurant Feedbacks</h1>
    <nav>
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('reviews') }}">Reviews</a>
      <a href="{{ url_for('analyze') }}">Analyze</a>
    </nav>
  </header>

  <main>
    <div class="review-box">
      <h2 class="submit-heading">Share Your Experience</h2>
      <div class="subtext">
        We’d love to know how your visit went.<br>
        Your feedback helps us improve and serve you better!
      </div>

      <div id="step1" class="form-step">
        <form id="feedbackForm">
          <textarea id="feedbackInput" placeholder="Write your feedback here..." required></textarea>
          <div style="text-align: center; margin-top: 10px;">
            <button id="nextBtn" type="button" class="glow-btn">Next</button>
          </div>
        </form>
      </div>

      <div id="step2" style="display:none;" class="form-step">
        <h3>Rate the Restaurant</h3>
        <form id="ratingForm">
          <div class="question"><label>How was the taste of the food?</label><div class="stars" data-q="0"></div></div>
          <div class="question"><label>Were our staff friendly and attentive?</label><div class="stars" data-q="1"></div></div>
          <div class="question"><label>Was the restaurant clean and comfortable?</label><div class="stars" data-q="2"></div></div>
          <div class="question"><label>How would you rate the ambience and music?</label><div class="stars" data-q="3"></div></div>
          <div class="question"><label>Did you find our prices reasonable?</label><div class="stars" data-q="4"></div></div>
          <div style="text-align: center; margin-top: 15px;">
            <button id="submitBtn" type="button" class="glow-btn">Submit Feedback</button>
          </div>
        </form>
      </div>

      <div id="messageArea" class="feedback-message">✅ Feedback submitted successfully!</div>
    </div>
  </main>

  <script src="{{ url_for('static', filename='js/reviews.js') }}"></script>
</body>
</html>
